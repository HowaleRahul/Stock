services:
  timescaledb:
    build:
      context: .
      dockerfile: Dockerfile.postgres-local
    container_name: trading_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: trading_secret_pwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_db || true"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
